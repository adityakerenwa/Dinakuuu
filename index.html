<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗 Untuk Pacarku Tersayang</title>
    
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d0a1a 25%, #4a1028 50%, #2d0a1a 75%, #1a0a0a 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* ===== GLOW BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at center, rgba(255, 50, 120, 0.12) 0%, transparent 70%);
            animation: glowPulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        /* ============================================================ */
        /* ===== BACKGROUND LAMPU CAHAYA ===== */
        /* ============================================================ */
        .bg-lights {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bg-light {
            position: absolute;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            filter: blur(80px);
            animation: bgLightPulse 4s ease-in-out infinite;
        }
        
        @keyframes bgLightPulse {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }
        
        /* ============================================================ */
        /* ===== BUNGA JATUH ===== */
        /* ============================================================ */
        .flowers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .flower {
            position: absolute;
            font-size: 24px;
            opacity: 0.25;
            animation: flowerFall linear infinite;
        }
        
        @keyframes flowerFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            5% {
                opacity: 0.25;
            }
            90% {
                opacity: 0.25;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }
        
        /* ============================================================ */
        /* ===== LOADING SCREEN ===== */
        /* ============================================================ */
        #loadingScreen {
            max-width: 420px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            z-index: 2;
            animation: fadeInUp 0.8s ease-out;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        #loadingScreen.hide {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .flower-spinner {
            font-size: 50px;
            display: inline-block;
            animation: spinFlower 1.5s linear infinite;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 30px rgba(255, 50, 120, 0.2));
        }
        
        @keyframes spinFlower {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .loading-text {
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.3em;
            font-weight: 300;
            letter-spacing: 1px;
            line-height: 1.6;
            animation: fadeInOut 2s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; transform: translateY(0px); }
            25% { opacity: 1; transform: translateY(-3px); }
            75% { opacity: 1; transform: translateY(-3px); }
            100% { opacity: 0.3; transform: translateY(0px); }
        }
        
        .loading-text .highlight {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff2d78 40%, #d41b5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }
        
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: #ff6b9d;
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* ============================================================ */
        /* ===== MAIN CONTAINER (PIN) ===== */
        /* ============================================================ */
        #mainContainer {
            max-width: 420px;
            width: 100%;
            padding: 40px 30px 30px;
            text-align: center;
            position: absolute;
            z-index: 1;
            background: rgba(26, 10, 10, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 50, 120, 0.15);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
            pointer-events: none;
        }
        
        #mainContainer.show {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: all;
        }
        
        .ornament {
            font-size: 1.2em;
            color: rgba(255, 50, 120, 0.3);
            letter-spacing: 8px;
            margin-bottom: 5px;
        }
        
        .emoji-big {
            font-size: 4em;
            display: block;
            margin-bottom: 5px;
            animation: pulseGlow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 50, 120, 0.3));
        }
        
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px rgba(255, 50, 120, 0.3)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 60px rgba(255, 50, 120, 0.5)); }
        }
        
        h1 {
            font-size: 1.4em;
            color: #fff;
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        
        h1 .highlight {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff2d78 40%, #d41b5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8em;
            margin-bottom: 20px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        
        .divider {
            width: 60px;
            height: 2px;
            margin: 0 auto 20px;
            background: linear-gradient(90deg, transparent, rgba(255, 50, 120, 0.5), transparent);
        }
        
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 25px;
        }
        
        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255, 50, 120, 0.3);
            background: transparent;
            transition: all 0.3s ease;
        }
        
        .pin-dot.filled {
            border-color: #ff2d78;
            background: #ff2d78;
            box-shadow: 0 0 20px rgba(255, 45, 120, 0.3);
        }
        
        .pin-dot.error {
            border-color: #ff1744;
            background: #ff1744;
            animation: shake 0.5s ease;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.3);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 320px;
            margin: 0 auto;
        }
        
        .key {
            padding: 18px 0;
            font-size: 1.8em;
            font-weight: 400;
            border: none;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: inherit;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .key:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        
        .key:active {
            transform: scale(0.92);
            background: rgba(255, 50, 120, 0.2);
        }
        
        .key-empty {
            visibility: hidden;
        }
        
        .key-delete {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .key-delete:hover {
            background: rgba(255, 23, 68, 0.15);
            color: #ff6b8a;
        }
        
        .key-delete:active {
            background: rgba(255, 23, 68, 0.25);
        }
        
        #status {
            min-height: 30px;
            margin-top: 15px;
            font-weight: 400;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        .status-error {
            color: #ff6b8a;
        }
        
        .status-success {
            color: #ff6b9d;
        }
        
        /* ============================================================ */
        /* ===== OVERLAY ANIMASI BUKA KADO ===== */
        /* ============================================================ */
        #giftOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(26, 10, 10, 0.7);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: fadeOverlay 0.5s ease-out;
            pointer-events: none;
        }
        
        #giftOverlay.show {
            display: flex;
            pointer-events: all;
        }
        
        @keyframes fadeOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .gift-container {
            text-align: center;
            animation: giftAppear 0.6s ease-out;
            position: relative;
            cursor: pointer;
        }
        
        @keyframes giftAppear {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }
        
        /* ===== TEKS ===== */
        .gift-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: 300;
            animation: textPulse 1.2s ease-in-out infinite;
        }
        
        @keyframes textPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }
        
        .gift-text .highlight-gift {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff2d78 40%, #d41b5a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }
        
        .gift-hint {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8em;
            margin-top: 15px;
            letter-spacing: 2px;
            animation: hintPulse 2s ease-in-out infinite;
        }
        
        @keyframes hintPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        /* ============================================================ */
        /* ===== KADO DENGAN TUTUP ===== */
        /* ============================================================ */
        .gift-wrapper {
            position: relative;
            width: 220px;
            height: 230px;
            margin: 0 auto 10px;
            perspective: 800px;
            cursor: pointer;
        }
        
        /* ===== BODY KADO (KOTAK BAWAH) ===== */
        .gift-body {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 170px;
            background: linear-gradient(145deg, #ff2d78, #d41b5a);
            border-radius: 0 0 16px 16px;
            box-shadow: 0 20px 60px rgba(255, 45, 120, 0.4);
            overflow: hidden;
            z-index: 2;
        }
        
        /* ===== CAHAYA LAMPU DI DALAM KADO ===== */
        .gift-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            border-radius: 0 0 16px 16px;
        }
        
        .light-ray {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(ellipse at center, rgba(255, 200, 100, 0.08) 0%, transparent 70%);
            animation: lightSweep 4s ease-in-out infinite;
            top: -25%;
            left: -25%;
        }
        
        .light-ray:nth-child(1) {
            animation-delay: 0s;
            background: radial-gradient(ellipse at 30% 40%, rgba(255, 200, 100, 0.08) 0%, transparent 60%);
        }
        
        .light-ray:nth-child(2) {
            animation-delay: 1.3s;
            background: radial-gradient(ellipse at 70% 60%, rgba(255, 100, 200, 0.08) 0%, transparent 60%);
        }
        
        .light-ray:nth-child(3) {
            animation-delay: 2.6s;
            background: radial-gradient(ellipse at 50% 80%, rgba(100, 200, 255, 0.08) 0%, transparent 60%);
        }
        
        @keyframes lightSweep {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.3; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
        }
        
        /* ===== BINTANG KILAU ===== */
        .gift-sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .gift-sparkle {
            position: absolute;
            font-size: 14px;
            animation: sparkleGlow 2s ease-in-out infinite;
        }
        
        @keyframes sparkleGlow {
            0%, 100% { opacity: 0.1; transform: scale(0.5) rotate(0deg); }
            50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
        }
        
        /* ===== PITA DI BODY ===== */
        .gift-ribbon-h {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 18px;
            background: linear-gradient(90deg, #ffd700, #ffb700, #ffd700);
            transform: translateY(-50%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            z-index: 2;
        }
        
        .gift-ribbon-v {
            position: absolute;
            top: 0;
            left: 50%;
            width: 18px;
            height: 100%;
            background: linear-gradient(180deg, #ffd700, #ffb700, #ffd700);
            transform: translateX(-50%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            z-index: 2;
        }
        
        /* ============================================================ */
        /* ===== TUTUP KADO (DI ATAS) ===== */
        /* ============================================================ */
        .gift-lid {
            position: absolute;
            top: 0;
            left: -8px;
            width: calc(100% + 16px);
            height: 65px;
            background: linear-gradient(165deg, #ff3d88, #c41652);
            border-radius: 14px 14px 6px 6px;
            z-index: 3;
            transform-origin: bottom center;
            transform: rotateX(0deg) translateY(0);
            transition: transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(255, 45, 120, 0.3);
            cursor: pointer;
            box-shadow: inset 0 -4px 20px rgba(0, 0, 0, 0.1), 0 8px 30px rgba(255, 45, 120, 0.3);
        }
        
        .gift-lid::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            border-radius: 14px 14px 6px 6px;
        }
        
        .gift-lid::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 10%;
            width: 80%;
            height: 12px;
            background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(4px);
        }
        
        /* ===== PITA BOW DI TUTUP ===== */
        .gift-bow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 4;
            font-size: 52px;
            filter: drop-shadow(0 5px 25px rgba(255, 215, 0, 0.4));
            transition: all 0.5s ease;
            pointer-events: none;
        }
        
        /* ===== PITA DI TUTUP ===== */
        .lid-ribbon-h {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(90deg, #ffd700, #ffb700, #ffd700);
            transform: translateY(-50%);
            z-index: 2;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        .lid-ribbon-v {
            position: absolute;
            top: 0;
            left: 50%;
            width: 12px;
            height: 100%;
            background: linear-gradient(180deg, #ffd700, #ffb700, #ffd700);
            transform: translateX(-50%);
            z-index: 2;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }
        
        /* ============================================================ */
        /* ===== ANIMASI KADO TERBUKA ===== */
        /* ============================================================ */
        .gift-wrapper.opened .gift-lid {
            transform: rotateX(-130deg) translateY(-30px);
            box-shadow: 0 30px 60px rgba(255, 45, 120, 0.1);
        }
        
        .gift-wrapper.opened .gift-bow {
            animation: bowFlyUp 0.9s ease forwards;
        }
        
        @keyframes bowFlyUp {
            0% {
                transform: translateX(-50%) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-140px) scale(1.6) rotate(400deg);
                opacity: 0;
            }
        }
        
        .gift-wrapper.opened .gift-body {
            box-shadow: 0 20px 80px rgba(255, 45, 120, 0.7);
        }
        
        /* ===== CAHAYA DARI DALAM KADO ===== */
        .gift-wrapper.opened .gift-body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 215, 0, 0.3) 0%, rgba(255, 100, 200, 0.2) 30%, transparent 70%);
            animation: innerGlow 1s ease-out forwards;
            z-index: 1;
            pointer-events: none;
            border-radius: 0 0 16px 16px;
        }
        
        @keyframes innerGlow {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* ===== BURST LIGHT ===== */
        .burst-light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 100, 0.6) 0%, rgba(255, 100, 200, 0.4) 30%, transparent 70%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
            animation: burstExpand 1.2s ease-out forwards;
        }
        
        @keyframes burstExpand {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
            }
            100% {
                width: 700px;
                height: 700px;
                opacity: 0;
            }
        }
        
        /* ============================================================ */
        /* ===== RESPONSIVE ===== */
        /* ============================================================ */
        @media (max-width: 500px) {
            #loadingScreen, #mainContainer { padding: 25px 20px; }
            .emoji-big { font-size: 3.2em; }
            h1 { font-size: 1.2em; }
            .loading-text { font-size: 1.1em; }
            .flower-spinner { font-size: 40px; }
            .flower { font-size: 18px; }
            .key { padding: 15px 0; font-size: 1.5em; }
            .pin-dot { width: 15px; height: 15px; gap: 12px; }
            
            .gift-wrapper { width: 170px; height: 185px; }
            .gift-body { height: 135px; }
            .gift-lid { top: 0; height: 55px; left: -6px; width: calc(100% + 12px); }
            .gift-bow { font-size: 40px; top: -24px; }
            .gift-text { font-size: 0.9em; }
            .gift-ribbon-h { height: 14px; }
            .gift-ribbon-v { width: 14px; }
            .lid-ribbon-h { height: 10px; }
            .lid-ribbon-v { width: 10px; }
        }
        
        @media (max-width: 380px) {
            .key { padding: 12px 0; font-size: 1.3em; }
            .pin-dot { width: 13px; height: 13px; gap: 10px; }
            .flower { font-size: 14px; }
            
            .gift-wrapper { width: 140px; height: 155px; }
            .gift-body { height: 115px; }
            .gift-lid { top: 0; height: 45px; left: -5px; width: calc(100% + 10px); }
            .gift-bow { font-size: 32px; top: -20px; }
            .gift-ribbon-h { height: 12px; }
            .gift-ribbon-v { width: 12px; }
            .lid-ribbon-h { height: 8px; }
            .lid-ribbon-v { width: 8px; }
        }
    </style>
</head>
<body>

<!-- ===== BACKGROUND LAMPU ===== -->
<div class="bg-lights">
    <div class="bg-light" style="top: 10%; left: 5%; background: rgba(255, 50, 120, 0.15); animation-delay: 0s;"></div>
    <div class="bg-light" style="top: 20%; right: 10%; background: rgba(255, 100, 200, 0.12); animation-delay: 1s;"></div>
    <div class="bg-light" style="bottom: 30%; left: 15%; background: rgba(200, 50, 255, 0.10); animation-delay: 2s;"></div>
    <div class="bg-light" style="bottom: 20%; right: 5%; background: rgba(255, 200, 100, 0.10); animation-delay: 0.5s;"></div>
    <div class="bg-light" style="top: 50%; left: 50%; background: rgba(255, 50, 120, 0.08); animation-delay: 1.5s; width: 300px; height: 300px;"></div>
</div>

<!-- ===== BUNGA JATUH ===== -->
<div class="flowers" id="flowersContainer"></div>

<!-- ===== LOADING ===== -->
<div id="loadingScreen">
    <div class="flower-spinner">🌸</div>
    <div class="loading-text">
        I have something <span class="highlight">special</span> for you
        <span class="cursor-blink"></span>
    </div>
</div>

<!-- ===== MAIN CONTAINER (PIN) ===== -->
<div id="mainContainer">
    <div class="ornament">✦ ✦ ✦</div>
    <span class="emoji-big">💗</span>
    <h1>Tanggal Jadian <br><span class="highlight">KITA</span></h1>
    <div class="divider"></div>
    
    <div class="pin-display" id="pinDisplay">
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
        <div class="pin-dot" id="dot4"></div>
        <div class="pin-dot" id="dot5"></div>
        <div class="pin-dot" id="dot6"></div>
    </div>
    
    <div id="status"></div>
    
    <div class="keypad">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key key-empty"></button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key key-delete" onclick="deleteKey()">⌫</button>
    </div>
</div>

<!-- ===== OVERLAY BUKA KADO ===== -->
<div id="giftOverlay">
    <div class="gift-container" id="giftContainer">
        <div class="gift-text">✨ <span class="highlight-gift">opening your gift...</span> ✨</div>
        
        <div class="gift-wrapper" id="giftWrapper" onclick="openGift()">
            <!-- BODY KADO (BAWAH) -->
            <div class="gift-body">
                <div class="gift-lights">
                    <div class="light-ray"></div>
                    <div class="light-ray"></div>
                    <div class="light-ray"></div>
                </div>
                
                <div class="gift-sparkles">
                    <span class="gift-sparkle" style="top:15%; left:20%; animation-delay:0s;">✦</span>
                    <span class="gift-sparkle" style="top:70%; right:15%; animation-delay:0.7s;">✨</span>
                    <span class="gift-sparkle" style="bottom:20%; left:30%; animation-delay:1.4s;">✦</span>
                    <span class="gift-sparkle" style="top:40%; right:25%; animation-delay:0.3s;">💗</span>
                    <span class="gift-sparkle" style="bottom:35%; right:35%; animation-delay:1.1s;">✨</span>
                    <span class="gift-sparkle" style="top:10%; right:40%; animation-delay:1.8s;">✦</span>
                </div>
                
                <div class="gift-ribbon-h"></div>
                <div class="gift-ribbon-v"></div>
            </div>
            
            <!-- TUTUP KADO (DI ATAS) -->
            <div class="gift-lid" id="giftLid">
                <div class="lid-ribbon-h"></div>
                <div class="lid-ribbon-v"></div>
                <div class="gift-bow">🎀</div>
            </div>
        </div>
        
        <div class="gift-hint">💗 klik kado untuk membukanya 💗</div>
    </div>
</div>

<script>
    // =================================================
    // 1. TANGGAL JADIAN
    // =================================================
    const TANGGAL_JADIAN = "240626";
    
    // =================================================
    // 2. STATE PIN
    // =================================================
    let pin = '';
    const maxPin = 6;
    const dots = [
        document.getElementById('dot1'),
        document.getElementById('dot2'),
        document.getElementById('dot3'),
        document.getElementById('dot4'),
        document.getElementById('dot5'),
        document.getElementById('dot6')
    ];
    const statusDiv = document.getElementById('status');
    let isGiftOpened = false;
    
    // =================================================
    // 3. FUNGSI KEYPAD
    // =================================================
    function pressKey(num) {
        if (pin.length >= maxPin) return;
        pin += num;
        updateDots();
        statusDiv.className = '';
        statusDiv.textContent = '';
        if (pin.length === maxPin) {
            checkPin();
        }
    }
    
    function deleteKey() {
        if (pin.length === 0) return;
        pin = pin.slice(0, -1);
        updateDots();
        statusDiv.className = '';
        statusDiv.textContent = '';
    }
    
    function updateDots() {
        dots.forEach((dot, index) => {
            if (index < pin.length) {
                dot.classList.add('filled');
                dot.classList.remove('error');
            } else {
                dot.classList.remove('filled');
                dot.classList.remove('error');
            }
        });
    }
    
    function resetPin() {
        pin = '';
        updateDots();
        statusDiv.className = '';
        statusDiv.textContent = '';
    }
    
    // =================================================
    // 4. CEK PIN
    // =================================================
    function checkPin() {
        if (pin.length < maxPin) {
            statusDiv.className = 'status-error';
            return;
        }
        
        if (pin === TANGGAL_JADIAN) {
            statusDiv.className = 'status-success';
            
            dots.forEach(dot => {
                dot.style.borderColor = '#ff2d78';
                dot.style.background = '#ff2d78';
                dot.style.boxShadow = '0 0 30px rgba(255, 45, 120, 0.5)';
            });
            
            setTimeout(() => {
                showGift();
            }, 600);
            
        } else {
            statusDiv.className = 'status-error';
            statusDiv.textContent = 'Masukkan Tanggal Jadian Kita sayang... 💗';
            
            dots.forEach(dot => {
                dot.classList.add('error');
            });
            
            setTimeout(() => {
                dots.forEach(dot => {
                    dot.classList.remove('error');
                });
                resetPin();
            }, 600);
        }
    }
    
    // =================================================
    // 5. SHOW GIFT
    // =================================================
    function showGift() {
        const overlay = document.getElementById('giftOverlay');
        overlay.classList.add('show');
    }
    
    // =================================================
    // 6. OPEN GIFT (TUTUP TERBUKA KE ATAS)
    // =================================================
    function openGift() {
        if (isGiftOpened) return;
        isGiftOpened = true;
        
        const wrapper = document.getElementById('giftWrapper');
        const hint = document.querySelector('.gift-hint');
        
        // Animasi tutup terbuka ke atas
        wrapper.classList.add('opened');
        
        // Buat efek ledakan cahaya
        const burst = document.createElement('div');
        burst.className = 'burst-light';
        wrapper.querySelector('.gift-body').appendChild(burst);
        
        // Sembunyikan hint (kalau ada)
        if (hint) {
            hint.style.opacity = '0';
            hint.style.transition = 'opacity 0.5s';
        }
        
        // Ganti teks
        const giftText = document.querySelector('.gift-text');
        if (giftText) {
            giftText.innerHTML = '💗 <span class="highlight-gift">Selamat Sayang! 💗</span>';
        }
        
        // Bunga confetti tambahan
        createGiftConfetti();
        
        // =============================================
        // PINDAH KE surat.html (2 DETIK)
        // =============================================
        setTimeout(function() {
            window.location.href = "surat.html";
        }, 2000);
    }
    
    // =================================================
    // 7. CONFETTI BUNGA
    // =================================================
    function createGiftConfetti() {
        const container = document.getElementById('flowersContainer');
        const symbols = ['💗', '🌸', '🌺', '🌷', '🌹', '✨', '💕', '💖', '🎀', '🌻', '💐'];
        
        for (let i = 0; i < 40; i++) {
            setTimeout(() => {
                const el = document.createElement('div');
                el.className = 'flower';
                el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (Math.random() * 22 + 16) + 'px';
                el.style.animationDuration = (Math.random() * 4 + 3) + 's';
                el.style.animationDelay = '0s';
                el.style.opacity = Math.random() * 0.6 + 0.3;
                container.appendChild(el);
                
                setTimeout(() => {
                    el.remove();
                }, 5000);
            }, i * 80);
        }
    }
    
    // =================================================
    // 8. KEYBOARD SUPPORT
    // =================================================
    document.addEventListener('keydown', function(e) {
        if (e.key >= '0' && e.key <= '9') {
            pressKey(e.key);
        } else if (e.key === 'Backspace' || e.key === 'Delete') {
            deleteKey();
        } else if (e.key === 'Enter') {
            checkPin();
        }
    });
    
    // =================================================
    // 9. BUNGA JATUH
    // =================================================
    function createFlowers() {
        const container = document.getElementById('flowersContainer');
        const flowerSymbols = ['🌸', '🌺', '🌷', '🌹', '🌻', '💐', '🌼', '🌸', '🌺', '🌷', '💗', '🌺'];
        
        for (let i = 0; i < 35; i++) {
            const flower = document.createElement('div');
            flower.className = 'flower';
            flower.textContent = flowerSymbols[Math.floor(Math.random() * flowerSymbols.length)];
            flower.style.left = Math.random() * 100 + '%';
            flower.style.fontSize = (Math.random() * 20 + 14) + 'px';
            flower.style.animationDuration = (Math.random() * 10 + 8) + 's';
            flower.style.animationDelay = (Math.random() * 15) + 's';
            flower.style.opacity = Math.random() * 0.25 + 0.1;
            container.appendChild(flower);
        }
    }
    
    // =================================================
    // 10. LOADING
    // =================================================
    const loadingScreen = document.getElementById('loadingScreen');
    const mainContainer = document.getElementById('mainContainer');
    
    function startLoading() {
        setTimeout(() => {
            loadingScreen.classList.add('hide');
            mainContainer.classList.add('show');
        }, 3000);
    }
    
    // =================================================
    // 11. START!
    // =================================================
    window.onload = function() {
        createFlowers();
        startLoading();
    };
</script>

</body>
</html>
